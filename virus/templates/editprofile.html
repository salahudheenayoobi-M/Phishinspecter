{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Profile | System Config</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-dark: #050508;
            --accent-red: #ff003c;
            --accent-blue: #00f2ff;
            --panel-bg: rgba(10, 10, 15, 0.95);
            --input-bg: rgba(255, 255, 255, 0.03);
            --border-glow: rgba(255, 0, 60, 0.3);
            --text-main: #ffffff;
            --text-dim: #888888;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Rajdhani', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: 
                linear-gradient(rgba(5, 5, 8, 0.8), rgba(5, 5, 8, 0.8)),
                url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b?auto=format&fit=crop&q=80&w=2070');
            background-size: cover;
        }

        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            opacity: 0.2;
            pointer-events: none;
        }

        .config-container {
            width: 500px;
            background: var(--panel-bg);
            border: 1px solid var(--border-glow);
            padding: 40px;
            position: relative;
            backdrop-filter: blur(20px);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
        }

        .header-section {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border-glow);
            padding-bottom: 20px;
        }

        .header-section h2 {
            font-family: 'Orbitron';
            letter-spacing: 4px;
            color: var(--accent-red);
            font-size: 1.4rem;
        }

        .header-section p {
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-top: 5px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-family: 'Orbitron';
            font-size: 0.7rem;
            color: var(--accent-blue);
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .form-input {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 12px 15px;
            color: white;
            font-family: 'Rajdhani';
            font-size: 1rem;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent-red);
            box-shadow: 0 0 10px rgba(255, 0, 60, 0.3);
        }

        .file-upload-wrapper {
            border: 1px dashed rgba(255,255,255,0.2);
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .file-upload-wrapper:hover {
            border-color: var(--accent-blue);
            background: rgba(0,242,255,0.05);
        }

        input[type="file"] {
            display: none;
        }

        .profile-preview {
            margin-top: 15px;
            text-align: center;
        }

        .profile-preview img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--accent-red);
        }

        .btn-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 30px;
        }

        .btn {
            font-family: 'Orbitron';
            font-size: 0.75rem;
            padding: 14px;
            text-transform: uppercase;
            text-align: center;
            cursor: pointer;
            border: 1px solid #333;
            background: transparent;
            color: white;
            transition: 0.3s;
        }

        .btn-save {
            background: var(--accent-red);
            border-color: var(--accent-red);
        }

        .btn-save:hover {
            background: white;
            color: black;
        }

        .btn-cancel:hover {
            border-color: white;
        }

        .corner-tag {
            position: absolute;
            top: 0;
            right: 0;
            padding: 5px 10px;
            background: var(--accent-red);
            font-family: 'Orbitron';
            font-size: 0.6rem;
        }
    </style>
</head>
<body>

<div class="config-container">
    <div class="corner-tag"></div>

    <div class="header-section">
        <h2>UPDATE PROFILE</h2>
        <p>You can change your profile data</p>
    </div>
    <form method="POST" enctype="multipart/form-data" onsubmit="return confirm('Do you want to apply these changes?');">
        {% csrf_token %}

        {% if user.image %}
        <div class="profile-preview">
            <img src="{{ user.image.url }}" alt="Profile Image">
        </div>
        {% endif %}

        <div class="form-group">
            <label>Full_Name</label>
            <input type="text" name="username" class="form-input" value="{{ user.username }}">
        </div>

        <div class="form-group">
            <label>Age</label>
            <input type="number" name="age" class="form-input" value="{{ user.age }}">
        </div>

        <div class="form-group">
            <label>Email_Address</label>
            <input type="email" name="email" class="form-input" value="{{ user.email }}">
        </div>

        <div class="form-group">
            <label>Password_Update</label>
            <input type="password" name="password" class="form-input" placeholder="Leave blank to keep current">
        </div>

        <div class="form-group">
            <label>Upload Image</label>
            <label for="id_image" class="file-upload-wrapper">
                <i class="fas fa-fingerprint"></i>
                <p style="font-size: 0.7rem; color: var(--text-dim);">
                    CLICK TO UPLOAD 
                </p>
            </label>
            <input type="file" name="image" id="id_image">
        </div>

        <div class="btn-container">
            <button type="submit" class="btn btn-save">Commit Changes</button>
            <a href="/profile/" class="btn btn-cancel">Cancel</a>
        </div>
    </form>
</div>

</body>
</html>
