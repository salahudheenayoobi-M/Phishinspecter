{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Operator Profile | {{ client.username }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-dark: #050506;
            --accent-red: #ff003c;
            --accent-blue: #00f2ff;
            --panel-bg: rgba(15, 15, 20, 0.95);
            --text-main: #f0f0f0;
            --text-dim: #888;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Rajdhani', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(255, 0, 60, 0.1) 0%, transparent 80%),
                url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b?auto=format&fit=crop&q=80&w=2070');
            background-size: cover;
        }

        /* Profile Container */
        .profile-container {
            width: 450px;
            background: var(--panel-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid var(--accent-red);
            padding: 40px;
            position: relative;
            backdrop-filter: blur(15px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
        }

        .profile-container::before {
            content: "";
            position: absolute;
            top: 10px;
            left: 10px;
            width: 20px;
            height: 20px;
            border-top: 2px solid var(--accent-red);
            border-left: 2px solid var(--accent-red);
        }

        /* Avatar */
        .avatar-wrapper {
            position: relative;
            width: 150px;
            height: 150px;
            margin: 0 auto 30px;
            padding: 5px;
            border: 1px solid var(--accent-red);
            border-radius: 50%;
        }

        .avatar-wrapper img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            filter: grayscale(40%) contrast(1.2);
        }

        .scan-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: var(--accent-red);
            top: 0;
            left: 0;
            box-shadow: 0 0 15px var(--accent-red);
            animation: scan 3s ease-in-out infinite;
            z-index: 10;
        }

        @keyframes scan {
            0%, 100% { top: 0%; opacity: 0; }
            50% { top: 100%; opacity: 1; }
        }

        /* Header */
        .profile-header {
            text-align: center;
        }

        .profile-header h2 {
            font-family: 'Orbitron';
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 5px;
            color: #fff;
        }

        .status-badge {
            font-size: 0.7rem;
            color: var(--accent-blue);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 25px;
            display: block;
        }

        /* Info Grid */
        .info-grid {
            text-align: left;
            margin-top: 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 20px;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 0.9rem;
        }

        .info-label {
            color: var(--accent-red);
            font-weight: 700;
            text-transform: uppercase;
            width: 80px;
        }

        .info-value {
            color: var(--text-main);
            font-weight: 300;
        }

        /* Buttons */
        .btn-group {
            margin-top: 35px;
            display: flex;
            gap: 10px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: 1px solid #333;
            background: transparent;
            color: #fff;
            font-family: 'Orbitron';
            font-size: 0.7rem;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--accent-red);
            border-color: var(--accent-red);
        }

        .btn:hover {
            background: #fff;
            color: #000;
        }

    </style>
</head>

<body>

<div class="profile-container">

    <div class="avatar-wrapper">
        <div class="scan-line"></div>
        {% if client.image %}
            <img src="{{ client.image.url }}" alt="Profile Image">
        {% else %}
            <img src="{% static 'default-profile.png' %}" alt="Operator">
        {% endif %}
    </div>

    <div class="profile-header">
        <h2>{{ client.username|default:"OPERATOR_01" }}</h2>
        <span class="status-badge">
            <i class="fas fa-circle" style="font-size: 0.5rem;"></i>
            Identity Verified
        </span>
    </div>

    <div class="info-grid">
       

        <div class="info-item">
            <span class="info-label">Age</span>
            <span class="info-value">{{ client.age|default:"--" }}</span>
        </div>

        <div class="info-item">
            <span class="info-label">Email</span>
            <span class="info-value">{{ client.email }}</span>
        </div>
    </div>

    <div class="btn-group">
        <a href="/dashboard/" class="btn">
            <i class="fas fa-arrow-left"></i> Back
        </a>

        <a href="{% url 'editprofile' %}" class="btn btn-primary">
            <i class="fas fa-user-edit"></i> Modify ID
        </a>
    </div>

</div>

</body>
</html>
