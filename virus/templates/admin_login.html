{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PhishInspect | Admin Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent: #38bdf8;
            --accent-glow: rgba(56, 223, 248, 0.6);
            --bg-dark: #0f172a;
            --card-dark: rgba(2, 6, 23, 0.95);
            --text-light: #f0f0f0;
            --btn-hover: #0ea5e9;
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(rgba(2,2,3,.85), rgba(2,2,3,.95)), url("https://images.unsplash.com/photo-1550751827-4bd374c3f58b");
            background-size: cover;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-light);
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background: url("https://images.unsplash.com/photo-1581091870627-cd3f45ef3f0b?auto=format&fit=crop&w=1470&q=80") no-repeat center center;
            background-size: cover;
            filter: blur(4px) brightness(0.5);
            z-index: 0;
        }

        .scanline {
            position: fixed; top: 0; left: 0; width: 100%; height: 2px;
            background: var(--accent); opacity: 0.15; animation: scan 6s linear infinite; z-index: 1;
        }
        @keyframes scan { from { top: 0; } to { top: 100%; } }

        .login-box {
            background: var(--card-dark);
            padding: 40px 30px;
            width: 380px;
            border-radius: 12px;
            box-shadow: 0 0 40px rgba(0,0,0,0.9);
            position: relative;
            z-index: 2;
            text-align: center;
            border: 1px solid rgba(56,223,248,0.3);
            backdrop-filter: blur(10px);
        }

        .project-name { font-family: 'Orbitron', sans-serif; font-size: 1.6rem; color: var(--accent); margin-bottom: 15px; }
        .icon { font-size: 50px; color: var(--accent); margin-bottom: 20px; }
        .login-box h2 { margin-bottom: 25px; color: var(--accent); font-family: 'Orbitron'; font-size: 1.5rem; }

        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { font-size: 14px; margin-bottom: 6px; display: block; color: var(--text-light); }
        .input-group input {
            width: 100%; padding: 12px; border-radius: 6px; border: none; outline: none;
            background: rgba(255,255,255,0.05); color: var(--text-light); font-size: 14px; transition: 0.3s;
        }
        .input-group input:focus { background: rgba(56,223,248,0.1); box-shadow: 0 0 10px var(--accent-glow); }

        .btn {
            width: 100%; padding: 12px; border: none; border-radius: 6px;
            background: var(--accent); color: black; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .btn:hover { background: var(--btn-hover); box-shadow: 0 0 25px var(--accent-glow); }

        /* BACK BUTTON */
        .back-link {
            position: fixed;
            top: 30px;
            left: 30px;
            z-index: 2500;
            color: var(--text-light);
            text-decoration: none;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
            padding: 8px 15px;
            border: 1px solid transparent;
            opacity: 0.7;
        }

        .back-link:hover {
            color: var(--accent);
            border: 1px solid var(--accent);
            background: rgba(56, 223, 248, 0.05);
            box-shadow: 0 0 15px var(--accent-glow);
            opacity: 1;
        }
    </style>
</head>
<body>

<a href="/" class="back-link">
    <i class="fas fa-arrow-left"></i> BACK
</a>

<div class="scanline"></div>

<div class="login-box">
    <div class="project-name">PHISHINSPECT</div>
    <div class="icon"><i class="fas fa-user-shield"></i></div>
    <h2>Admin Login</h2>

    <form method="POST">
        {% csrf_token %}
        <div class="input-group">
            <label>Username</label>
            <input type="text" name="username" placeholder="Enter admin username" required>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="Enter password" required>
        </div>

        <button type="submit" class="btn">
            <i class="fas fa-sign-in-alt"></i> Login
        </button>
    </form>
</div>

</body>
</html>
